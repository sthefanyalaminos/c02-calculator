<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Emissão de CO₂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">Calculadora de Emissão de CO₂</h1>
        <p class="header__subtitle">Calcule as emissões de CO₂ das suas viagens e contribua para um futuro mais sustentável</p>
    </header>

    <main class="main">
        <form id="calculator-form" class="calculator-form">
            <div class="calculator-form__section">
                <label for="origin" class="calculator-form__label">Origem</label>
                <input 
                    type="text" 
                    id="origin" 
                    class="calculator-form__input" 
                    placeholder="Digite a cidade de origem"
                    list="cities-list"
                    required
                >
            </div>

            <div class="calculator-form__section">
                <label for="destination" class="calculator-form__label">Destino</label>
                <input 
                    type="text" 
                    id="destination" 
                    class="calculator-form__input" 
                    placeholder="Digite a cidade de destino"
                    list="cities-list"
                    required
                >
            </div>

            <datalist id="cities-list"></datalist>

            <div class="calculator-form__section">
                <label for="distance" class="calculator-form__label">Distância (km)</label>
                <input 
                    type="number" 
                    id="distance" 
                    class="calculator-form__input" 
                    readonly
                    min="0"
                >
                <p class="calculator-form__helper-text">A distância será preenchida automaticamente</p>
            </div>

            <div class="calculator-form__section calculator-form__section--checkbox">
                <input 
                    type="checkbox" 
                    id="manual-distance" 
                    class="calculator-form__checkbox"
                >
                <label for="manual-distance" class="calculator-form__checkbox-label">Inserir distância manualmente</label>
            </div>

            <fieldset class="calculator-form__fieldset">
                <legend class="calculator-form__legend">Modo de Transporte</legend>
                <div class="calculator-form__transport-grid">
                    <label class="calculator-form__transport-option">
                        <input 
                            type="radio" 
                            name="transport" 
                            value="bicycle" 
                            class="calculator-form__radio"
                        >
                        <span class="calculator-form__transport-label">🚴 Bicicleta</span>
                    </label>

                    <label class="calculator-form__transport-option">
                        <input 
                            type="radio" 
                            name="transport" 
                            value="car" 
                            checked 
                            class="calculator-form__radio"
                        >
                        <span class="calculator-form__transport-label">🚗 Carro</span>
                    </label>

                    <label class="calculator-form__transport-option">
                        <input 
                            type="radio" 
                            name="transport" 
                            value="bus" 
                            class="calculator-form__radio"
                        >
                        <span class="calculator-form__transport-label">🚌 Ônibus</span>
                    </label>

                    <label class="calculator-form__transport-option">
                        <input 
                            type="radio" 
                            name="transport" 
                            value="truck" 
                            class="calculator-form__radio"
                        >
                        <span class="calculator-form__transport-label">🚚 Caminhão</span>
                    </label>
                </div>
            </fieldset>

            <button type="submit" class="calculator-form__submit">Calcular Emissão</button>
        </form>

        <section id="results" class="results hidden">
            <div id="results-content" class="results__content"></div>
        </section>

        <section id="comparison" class="comparison hidden">
            <div id="comparison-content" class="comparison__content"></div>
        </section>

    </main>

    <footer class="footer">
        <p class="footer__text">Desenvolvido por Sthefany Alaminos, durante o Bootcamp CI&T – Do Prompt ao Agente, realizado pela DIO.</p>
    </footer>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
